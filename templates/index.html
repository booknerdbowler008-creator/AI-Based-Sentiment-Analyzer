<!DOCTYPE html>
<html>
<head>
<title>AI Sentiment Analyzer</title>
</head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<body>
<center><h1>AI-Based Sentiment Analyzer</h1><form method="POST">
<textarea
name="review"
rows="6"
cols="50"
maxlength="500"
placeholder="Enter your review here (Maximum 100 words)"
required>
</textarea>
<br><br>
<button type="submit">
Analyze
</button>
</form>
{% if result %}
<h2>Result:</h2>
<p>Sentiment: <b>{{ result.label }}</b></p>
<p>Confidence: <b>{{ "%.2f"|format(result.score*100) }}%</b></p>
{% endif %}
</center>
</body>
</html>
